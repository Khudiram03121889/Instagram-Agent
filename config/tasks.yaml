write_script_task:
  description: >
    Write a 30-40 second Instagram Reel script about the topic: {topic}.
  
      {topic_profile}
  
      You MUST follow the worldview, writing discipline, and structural framework
      defined in INSTRUCTIONS.md. Treat it as non-negotiable law.
      You MUST ALSO honour the TOPIC PROFILE above — your language, tone, and visual
      awareness must reflect the cinematic category provided.
  
      YOUR GOAL: Provide a COMPREHENSIVE SYNTHESIS of the topic. Do not just focus
      on one narrow fact. Instead, use the 5-clip sequence to bridge between the
      most significant dimensions of the topic (e.g., its scale, its mechanism,
      its impact, and its mystery). The script should feel like a complete "mini-world"
      exploration of {topic}.
  
      HARD REQUIREMENTS:
  
      STRUCTURE:
      - Write exactly 5 clips.
      - Each clip must represent ONE idea only.
      - Clip 1 (Hook) introduces the topic with a **SENSORY ENTRY**. Use a feeling, 
        sound, or observation—never a definition.
      - Clip 2 (Curiosity) raises the "why?" question about a core aspect.
      - Clip 3 (Reason) explains the primary mechanism or underlying cause.
      - Clip 4 (Meaning) reveals a deeper dimension or a **CONTRAST** (Before/After).
      - Clip 5 (Anchor) brings all these aspects together into a personal realization.
      - Clips 2, 3, 4, and 5 MUST begin with a bridge opener TEMPLATE that you MUST
        complete using the previous clip's concept.

      WORD COUNT & COMPRESSION (STRICT — PER-CLIP LIMITS):
      - Clip 1 (Hook):      max 14 words (~9 seconds)
      - Clip 2 (Curiosity):  max 13 words (~8 seconds)
      - Clip 3 (Reason):     max 13 words (~8 seconds)
      - Clip 4 (Meaning):    max 15 words (~10 seconds)
      - Clip 5 (Anchor):     max 14 words (~9 seconds)
      - Total reel: ~44 seconds.
      - Delete filler words (the, a, and). Use action verbs and adjective stacking.
      - If a script isn't poetic and compressed, it is INVALID.

    - Allowed bridge templates:
      "To understand that [concept],", "Because of this [process],",
      "So what's happening is [interaction],", "That's why [result],",
      "And this isn't just theory, it's [application],",
      "What makes this [concept] interesting is,",
      "And if you think about it, [implication],",
      "In other words, [simplification],",
      "The reason this [phenomenon] matters is,",
      "Which means [outcome],".
    - For clips 2-5, the bridge opener MUST be the first words spoken and MUST
      be completed with a noun or adjective that refers back to the previous clip.
    - Do not repeat the same bridge template in back-to-back clips.
    - Each clip must verbally connect to the previous clip and continue the same thought.

    NARRATIVE THREAD (CRITICAL):
    - Each clip's last word or concept must be echoed and expanded in the next
      clip's bridge opener. This creates a verbal handshake between clips.
    - **BAD Bridging (Mechanical):**
      Clip 1: "...the speed of light."
      Clip 2: "To understand that, we must look at..."
      (REASON: "That" is too generic and adds no value.)
    - **GOOD Bridging (Value-Adding):**
      Clip 1: "...the speed of light."
      Clip 2: "To understand that cosmic speed limit, we must look at..."
      (REASON: It defines the speed as a "limit" and bridges the thought.)
    - If any clip can be understood independently without the previous clip,
      the script is INVALID.
    - If any bridge opener is used without the echoing concept, the script is INVALID.

    TIMING (CRITICAL — PER-CLIP LIMITS):
    - Assume a calm narration speed of ~2 words per second.
    - Clip 1: max 14 words (~9 seconds).
    - Clip 2: max 13 words (~8 seconds).
    - Clip 3: max 13 words (~8 seconds).
    - Clip 4: max 15 words (~10 seconds).
    - Clip 5: max 14 words (~9 seconds).
    - If any clip exceeds its per-clip limit, the script is INVALID and must be revised.
    - Total reel is 5 clips = ~44 seconds.

    STYLE:
    - Tone must be calm, curious, and documentary-like.
    - Avoid fact-dumps, lists, or compressed explanations.
    - Prefer short sentences over long ones.
    - LANGUAGE MUST MATCH THE CATEGORY in the TOPIC PROFILE (e.g. cosmic-scale words
      for COSMOS, perceptual words for MIND, transformation words for CHEMISTRY, etc.)

    SERIES CONTINUITY (when topic has a series prefix):
    If the topic belongs to a named series (e.g. BrainLies, InvisibleUniverse),
    write the script so it feels like one episode of a larger story.
    Clip 5 (Anchor) must end with a subtle forward hook — a statement
    that makes the viewer curious about the next episode.

    Examples of forward hooks in Clip 5:
    "And this is just one way your brain rewrites reality."
    "The universe hides even stranger things than this."
    "Your body does something even more unexpected while you sleep."

    Never say "next video" or "part 2". Plant the curiosity naturally.
    The viewer should feel like they are in the middle of a larger journey.

    SERIES AWARENESS (READ THE TOPIC PROFILE SERIES CONTEXT BLOCK):
    - If SERIES CONTEXT shows a series_name, this reel is one episode
      in a larger series. The viewer may have watched previous episodes.
    - Clip 5 MUST end with a forward hook that plants curiosity about
      what comes next in the series. See examples below.
    - If SERIES CONTEXT shows "standalone topic", ignore this rule entirely.
    
    FORWARD HOOK EXAMPLES BY CATEGORY:
    MIND series:
      "And this is just one way your brain rewrites your reality."
      "Your brain hides something even stranger than this."
    COSMOS series:
      "The universe keeps even darker secrets than this."
      "And this is only one layer of what space conceals."
    BIOLOGY series:
      "Your body runs processes far stranger than this one."
      "And while you read this, something similar is happening inside you."
    PHYSICS series:
      "Time behaves even more strangely at smaller scales."
      "And this is only where the strangeness begins."

    FLOW:
    - The script must follow this 5-clip cognitive sequence:
      Hook -> Curiosity -> Reason -> Meaning -> Personal Anchor.
    - If any clip can be understood independently without the previous clip,
      the script is INVALID.

    ENDING:
    - The final clip (Clip 5) must end with a personal realization or quiet insight.
    - The final clip must still start with a bridge opener before the insight.

    OUTPUT FORMAT (STRICT - NO DEVIATION):
    Title: <short, clear title>

    Clip 1:
    <spoken script>

    Clip 2:
    <spoken script>

    Clip 3:
    <spoken script>

    Clip 4:
    <spoken script>

    Clip 5:
    <spoken script>

    The script must be revised until all timing and continuity rules are satisfied.
  expected_output: >
    A 5-clip reel script where Clip 1 is under 14 words, Clips 2-3 under 13 words,
    Clip 4 under 15 words, and Clip 5 under 14 words. Clips 2-5 start with approved
    bridge openers, each clip's last concept is echoed in the next clip's opener
    (Narrative Thread), and the format is exactly as requested with no extra text.
    Language style must match the topic category.
  agent: script_writer

validate_script_task:
  description: >
    You are the Script Quality Validator. You receive a 5-clip reel script from
    the Script Writer and your ONLY job is to validate it against the strict rules.

    CHECK EVERY CLIP FOR:

    1. WORD COUNT (PER-CLIP LIMITS):
       - Clip 1 (Hook):     max 14 words
       - Clip 2 (Curiosity): max 13 words
       - Clip 3 (Reason):    max 13 words
       - Clip 4 (Meaning):   max 15 words
       - Clip 5 (Anchor):    max 14 words
       - Count EVERY word including articles and bridge openers.

    2. BRIDGE OPENERS (Clips 2-5):
       - Each clip MUST start with one of the approved bridge templates.
       - The bridge opener MUST be completed with a noun/adjective from the previous clip.
       - No two consecutive clips may use the same bridge template.

    3. NARRATIVE THREAD:
       - Each clip's last concept must be echoed in the next clip's bridge opener.
       - If any clip can be understood independently, the thread is broken.

    RULES:
    - If ALL clips pass → output the script EXACTLY as received, unchanged.
    - If any clip FAILS → rewrite ONLY that clip. Do not touch passing clips.
    - After rewriting, verify the fix passes all checks before outputting.
    - Output in the same format as the original script.
  expected_output: >
    A validated 5-clip script that passes all word count, bridge opener, and
    narrative thread checks. Format identical to the original script.
  agent: script_validator

format_json_task:
  description: >
    Convert the previously generated Instagram Reel script into video-generation
    JSON prompts.

    {topic_profile}

    You MUST follow the rules in INSTRUCTIONS.md AND the TOPIC PROFILE above.
    The TOPIC PROFILE is the SINGLE SOURCE OF TRUTH for all visual and audio choices.

    HARD REQUIREMENTS:

    VISUAL (MANDATORY — NO CLICHÉS):
    - video_style MUST come from the TOPIC PROFILE's "video_style" field.
    - FORBIDDEN: Glowing brains, people walking, literal diagrams.
    - REQUIRED: CINEMATIC METAPHORS (fireflies, heavy silk, ancient libraries).
    - Clip 1 (Hook) visual: wide, atmospheric, establishes the cinematic world.
    - Clip 2 (Curiosity) visual: slightly tighter, a visual "lean-in" suggesting the question.
    - Clip 3 (Reason) visual: closer, shows the process or mechanism.
    - Clip 4 (Meaning) visual: **CONTRAST/BEFORE-AFTER**. Show the impact.
    - Clip 5 (Anchor) visual: intimate, calm, viewer is part of the scene.

    VOICE (LOCKED — NON-NEGOTIABLE):
    - The "voice" object MUST match the TOPIC PROFILE's "voice_profile" EXACTLY.
    - EVERY SINGLE CLIP must have the IDENTICAL "voice" object.
    - NEVER change gender, tone, or speed between clips.
    - One narrator tells the full story. Clip-to-clip voice changes destroy
      the continuity of the stitched video.
    - The voice settings from the TOPIC PROFILE override everything else.

    AUDIO (LOCKED — NON-NEGOTIABLE):
    - "background_audio.type" MUST come from the TOPIC PROFILE's "audio_type" field.
      BANNED: "ambient sci-fi" — never use this generic fallback.
    - "background_audio.volume" MUST come from the TOPIC PROFILE's "audio_volume" field.
    - EVERY SINGLE CLIP must have the IDENTICAL "background_audio" object.
    - Changing audio between clips breaks immersion when the video is stitched.

    STRUCTURE:
    - Return a SINGLE JSON LIST containing one object per clip.
    - Each clip object MUST match the REQUIRED JSON STRUCTURE.
    - Label each clip: "clip_label": "CLIP 1", "CLIP 2", etc.
    - "voice_text" must match the script verbatim including bridge openers.
    - Do not add, remove, or rewrite any words.

    OUTPUT FORMAT (STRICT):
    Return ONLY a valid JSON list. No markdown backticks. No commentary.
    [
      {
        "clip_label": "CLIP 1",
        "voice_text": "<exact clip text>",
        "voice": {
          "gender": "<from topic profile>",
          "tone": "<from topic profile>",
          "speed": <from topic profile>
        },
        "background_audio": {
          "generate_with_video": true,
          "type": "<from topic profile audio_type>",
          "volume": <from topic profile audio_volume>
        },
        "visual": "<rich, topic-specific scene description>",
        "video_style": "<from topic profile video_style>",
        "orientation": "portrait",
        "aspect_ratio": "9:16"
      },
      ...
    ]
  expected_output: >
    A JSON list where every clip uses the topic profile's video_style, audio_type,
    and identical voice settings. No clip may use a generic default style.
    Voice and audio objects must be byte-for-byte identical across all clips.
  agent: prompt_engineer

generate_video_task:
  description: >
    YOU MUST IMMEDIATELY CALL the "Video Generation Browser Tool" to generate videos.

    DO NOT describe what you would do. DO NOT output JSON describing a tool call.
    ACTUALLY INVOKE THE TOOL RIGHT NOW.

    1. Take the ENTIRE OUTPUT from the previous task (Prompt Engineer) which is a JSON string.
    2. Call the 'Video Generation Browser Tool' with:
       - json_content: The exact JSON string output from the previous task.
       - url: Use the TARGET URL provided below.
       - project_name: Use the PROJECT NAME provided below.

    CRITICAL: You must EXECUTE the tool, not describe it.
    The tool will open a browser, click buttons, and generate videos.
  expected_output: >
    The actual output from executing the Video Generation Browser Tool,
    showing confirmation that videos were generated for each clip.
  agent: browser_operator

generate_caption_task:
  description: >
    Write a caption for the Instagram Reel based on the script provided by the
    Script Writer.

    {topic_profile}

    You MUST follow the Instagram Science Reel Caption Generator Agent rules in
    INSTRUCTIONS.md. Your tone must also match the TOPIC PROFILE's category:
    cosmic-reflective for COSMOS, warm-introspective for MIND, precise for PHYSICS,
    organic for BIOLOGY, and so on.

    HARD REQUIREMENTS:
    - Do NOT explain the science again.
    - Max 2-4 short lines.
    - Tone: Calm, Curious, Reflective — and category-appropriate.
    - Follow one of the formats: Quiet Insight, Gentle Curiosity, or Personal Anchor.
    - Use exactly 4-5 relevant science hashtags (match to the category, not just generic).
    - NO emojis.

    OUTPUT FORMAT:
    <Caption Text>

    <Hashtags>
  expected_output: >
    A short, reflective caption with 4-5 topic-appropriate hashtags. Tone matches
    the topic category from the TOPIC PROFILE.
  agent: caption_writer

archive_content_task:
  description: >
    Collect the outputs from the Script Writer (Script), Prompt Engineer
    (JSON Prompts), Caption Writer (Caption), and Editing Advisor
    (Editing Instructions).

    1. Format them into a single readable text string with these headers
       in this exact order:
       "--- SCRIPT ---"
       "--- PROMPTS ---"
       "--- CAPTION ---"
       "--- EDITING INSTRUCTIONS (VN APP) ---"

    2. CALL the 'File Archiver Tool' with:
       - content: The formatted string containing all four sections.
       - topic: {topic} (The topic name provided).

    You must explicitly call the tool to save the file.
  expected_output: >
    Confirmation that the file was saved successfully with all four
    sections including the VN editing instructions.
  agent: archivist

generate_editing_task:
  description: >
    Generate precise VN app editing instructions for the completed reel.

    {topic_profile}

    You have access to:
    - The validated 5-clip script (from the Script Validator)
    - The topic profile above (for category-specific filter and audio choices)

    YOUR OUTPUT must be a numbered checklist with EXACTLY these sections
    in this order. Do not skip any section. Do not add extra sections.

    ═══════════════════════════════════════
    SECTION A — IMPORT & TIMELINE SETUP
    ═══════════════════════════════════════
    Give exact steps for:
    - How to create a new project in VN at 9:16 ratio
    - Import order of the 5 clips (Clip 1 first, Clip 5 last)
    - Timeline arrangement confirmation

    ═══════════════════════════════════════
    SECTION B — CLIP TIMING & PAUSES
    ═══════════════════════════════════════
    For each of the 5 clips, specify:
    - The clip's role (Hook / Curiosity / Reason / Meaning / Anchor)
    - Whether to trim or keep full duration
    - Exact pause to add AFTER each clip (in seconds):
        After Clip 1: 1.5 seconds
        After Clip 2: 1.0 second
        After Clip 3: 1.0 second
        After Clip 4: 2.0 seconds  ← longest pause, idea must land
        After Clip 5: 1.5 seconds
    - How to add a freeze frame or black frame in VN for the pause

    ═══════════════════════════════════════
    SECTION C — AUDIO FIXES
    ═══════════════════════════════════════
    Give exact steps for:
    - How to add audio crossfade at each clip boundary in VN
      (use 3-4 frames crossfade duration — specify the exact VN setting)
    - How to set ambient audio volume curve:
        During narration: ambient at 10-12% volume
        During pauses: ambient rises to 25-30% volume
    - How to check that all 5 clips use the same audio level

    ═══════════════════════════════════════
    SECTION D — COLOR GRADE
    ═══════════════════════════════════════
    Give exact steps for:
    - Which VN filter to apply (use the CATEGORY from the topic profile
      to pick from the CATEGORY-SPECIFIC FILTER GUIDE in your backstory)
    - Exact filter intensity percentage
    - How to apply the SAME filter to all 5 clips simultaneously in VN
      (use VN's "Apply to All" feature)
    - Color temperature direction (warmer or cooler)
    - Brightness and contrast adjustments if needed (give exact values)

    ═══════════════════════════════════════
    SECTION E — TRANSITIONS BETWEEN CLIPS
    ═══════════════════════════════════════
    Give exact steps for:
    - Which VN transition to use between each clip pair
    - Duration of each transition (in frames or seconds)
    - Rule: transitions must be SUBTLE — never flashy
    - Recommended: "Dissolve" or "Fade" at 0.3 seconds maximum

    ═══════════════════════════════════════
    SECTION F — CAPTION OVERLAY (OPTIONAL)
    ═══════════════════════════════════════
    Based on the script, specify:
    - Whether to add any on-screen text
    - If yes: which clip, what text, what font style in VN,
      what position (bottom center), what duration
    - If no: state clearly "No text overlay needed for this reel"

    ═══════════════════════════════════════
    SECTION G — FINAL EXPORT SETTINGS
    ═══════════════════════════════════════
    Give exact VN export settings for Instagram:
    - Resolution: 1080 x 1920 (9:16)
    - Frame rate: 30fps
    - Quality: Highest available in VN
    - File format: MP4
    - How to find these settings in VN before exporting

    OUTPUT FORMAT (MANDATORY):
    Output plain text only. No JSON. No markdown headers.
    Use the section headers exactly as shown above.
    Number every instruction within each section starting from 1.
    Be specific. Be short per step. One action per numbered point.

  expected_output: >
    A complete 7-section editing checklist specific to VN app and the
    topic's science category. Every instruction is numbered, actionable,
    and specific to VN. No vague suggestions. Total output should be
    readable in under 2 minutes and executable in under 20 minutes.
  agent: editing_advisor
