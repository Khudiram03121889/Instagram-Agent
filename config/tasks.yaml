build_story_blueprint_task:
  description: >
    Build a clarity-first story blueprint for this Instagram Reel topic:
    {topic}

    {topic_profile}

    PIPELINE GOAL:
    - Viewer understanding comes first.
    - The explanation must feel smooth, connected, and easy to follow.
    - Default to 5 clips.
    - Use 6 clips only if 5 would feel too compressed.
    - If the topic still feels crowded in 6 clips, narrow the topic angle.

    REQUIRED TOP-LEVEL FIELDS:
    - topic_angle
    - clip_count
    - clips

    REQUIRED PER-CLIP FIELDS:
    - clip_number
    - clip_role
    - core_idea
    - bridge_from_previous
    - next_clip_seed
    - viewer_takeaway
    - visual_anchor_terms

    ROLE ORDER RULE:
    - 5-clip mode:
      1 Hook
      2 Question
      3 Mechanism
      4 Contrast/Payoff
      5 Personal Takeaway
    - 6-clip mode:
      1 Hook
      2 Question
      3 Mechanism Part 1
      4 Mechanism Part 2
      5 Contrast/Payoff
      6 Personal Takeaway

    VISUAL ANCHOR RULE:
    - visual_anchor_terms must contain 2-4 literal nouns or actions.
    - No abstract metaphor anchors.
    - They must be easy to show on screen.

    OUTPUT FORMAT (STRICT):
    Return ONLY valid JSON. No markdown fences. No commentary.
  expected_output: >
    A valid JSON story blueprint with a narrowed topic angle when needed and
    5 or 6 ordered clips ready for script writing.
  agent: story_blueprint_designer

write_script_task:
  description: >
    Write a clarity-first Instagram Reel script about: {topic}

    {topic_profile}

    WRITING GOAL:
    - Make the topic easy to understand in one listen.
    - Follow the approved story blueprint exactly.
    - Keep the sequence smooth and connected.

    SCRIPT RULES:
    - Use the blueprint's clip count and role order exactly.
    - Each clip explains one idea only.
    - Each clip should sound spoken, not compressed or slogan-like.
    - Use 1 to 3 short sentences per clip.
    - Clips 2+ must continue the planted concept from the previous clip.
    - Use simple common English that a 14-year-old can follow.
    - Avoid jargon unless you explain it immediately in plain English.
    - Avoid vague lines, mystery-box phrasing, and poetic filler.
    - End with a clear personal takeaway.

    OUTPUT FORMAT (STRICT):
    Title: <short title>

    Clip 1:
    <text>

    Clip 2:
    <text>

    Continue the same format until the final clip in the blueprint.
  expected_output: >
    A smooth, connected reel script that follows the approved blueprint and is
    easy to understand in one listen.
  agent: script_writer

validate_script_task:
  description: >
    Validate the reel script against the approved blueprint and rewrite ONLY failing clips.

    VALIDATION GOALS:
    1) Keep the blueprint clip count and role order.
    2) Make sure each clip explains one idea clearly.
    3) Make sure clips 2+ continue the planted concept from the previous clip.
    4) Remove vague, boring, poetic, or over-compressed lines.
    5) Ensure the contrast/payoff clip creates a real reveal or contrast.
    6) Ensure the final clip ends with a direct takeaway, not a teaser.

    RULES:
    - If all clips pass, return the script unchanged.
    - If any clip fails, rewrite ONLY the failing clip(s).
    - Preserve passing clips exactly as they are.
    - Keep the language simple, spoken, and easy to visualize.
    - Return ONLY the final corrected script. No analysis. No checklist. No commentary.

    OUTPUT FORMAT (STRICT):
    Title: <short title>

    Clip 1:
    <text>

    Clip 2:
    <text>

    Continue the same format until the final clip in the script.
  expected_output: >
    A validated reel script that passes clarity, continuity, and takeaway checks.
    Only failing clips may be rewritten.
  agent: script_validator

format_json_task:
  description: >
    Convert the validated reel script into a single JSON list with 5 or 6 clip objects.

    {topic_profile}

    HARD JSON CONTRACT (EVERY CLIP):
    - Keep voice_text exactly as script text (no rewriting).
    - Keep one identical voice object for all clips.
    - Keep one identical background_audio object for all clips.
    - background_audio MUST use keys: generate_with_video, type, volume, sfx_layers.
    - Use topic profile video_style and audio_type exactly.
    - Add clip_role from the approved blueprint.
    - Add sync_terms from the approved blueprint and narration concepts.
    - Add visual_goal that states what the viewer should understand from this clip.
    - The visual must stay inside the script's established concept. Do not invent new ideas.

    VISUAL-SCRIPT SYNC RULE:
    - Visual must directly show what voice_text describes.
    - Avoid abstract metaphors.
    - Use literal educational visuals with readable motion and continuity.

    OUTPUT FORMAT (STRICT):
    Return ONLY valid JSON list. No markdown fences. No commentary.

    REQUIRED SHAPE:
    [
      {
        "clip_label": "CLIP 1",
        "clip_role": "Hook",
        "voice_text": "...",
        "sync_terms": ["..."],
        "visual_goal": "...",
        "voice": {...},
        "background_audio": {
          "generate_with_video": true,
          "type": "<from topic profile audio_type>",
          "volume": <from topic profile audio_volume>,
          "sfx_layers": "<from topic profile sfx_layers>"
        },
        "visual": "...",
        "video_style": "...",
        "orientation": "portrait",
        "aspect_ratio": "9:16"
      }
    ]
  expected_output: >
    A valid JSON list with 5 or 6 clips that preserves strict voice/audio
    continuity and adds clip_role, sync_terms, and visual_goal for each clip.
  agent: prompt_engineer

generate_video_task:
  description: >
    YOU MUST IMMEDIATELY CALL the "Video Generation Browser Tool" to generate videos.

    DO NOT describe what you would do. DO NOT output JSON describing a tool call.
    ACTUALLY INVOKE THE TOOL RIGHT NOW.

    1. Take the ENTIRE OUTPUT from the previous task (Prompt Engineer) which is a JSON string.
    2. Call the 'Video Generation Browser Tool' with:
       - json_content: The exact JSON string output from the previous task.
       - url: Use the TARGET URL provided below.
       - project_name: Use the PROJECT NAME provided below.
       - dry_run: Use the DRY RUN value provided below.

    CRITICAL:
    - You must EXECUTE the tool, not describe it.
    - The tool will validate sync locally before it launches Flow.
    - If the tool fails, return the tool output exactly.
  expected_output: >
    The actual output from executing the Video Generation Browser Tool,
    showing validation status or generation confirmation for each clip.
  agent: browser_operator

generate_caption_task:
  description: >
    Write a caption for the Instagram Reel based on the validated script.

    {topic_profile}

    You MUST follow the Instagram Science Reel Caption Generator Agent rules in
    INSTRUCTIONS.md. Your tone must also match the TOPIC PROFILE's category:
    cosmic-reflective for COSMOS, warm-introspective for MIND, precise for PHYSICS,
    organic for BIOLOGY, and so on.

    HARD REQUIREMENTS:
    - Do NOT explain the science again.
    - Max 2-4 short lines.
    - Tone: Calm, Curious, Reflective - and category-appropriate.
    - Follow one of the formats: Quiet Insight, Gentle Curiosity, or Personal Anchor.
    - Use exactly 4-5 relevant science hashtags.
    - Emojis are ALLOWED and encouraged when they add warmth - use 1-2 max.

    OUTPUT FORMAT:
    <Caption Text>

    <Hashtags>
  expected_output: >
    A short, reflective caption with 4-5 topic-appropriate hashtags. Tone matches
    the topic category from the TOPIC PROFILE.
  agent: caption_writer

archive_content_task:
  description: >
    Collect the outputs from the Script Writer (Script), Prompt Engineer
    (JSON Prompts), Caption Writer (Caption), and Editing Advisor
    (Editing Instructions).

    1. Format them into a single readable text string with these headers
       in this exact order:
       "--- SCRIPT ---"
       "--- PROMPTS ---"
       "--- CAPTION ---"
       "--- EDITING INSTRUCTIONS (VN APP) ---"

    Your final answer MUST be the perfectly formatted document containing all four sections.

    CRITICAL FORMAT RULE FOR SCRIPT SECTION:
    - Keep the title line.
    - Preserve every clip label in order.
    - Support either 5 or 6 clips.
    - If the script received does not have clip labels, add them sequentially based on line order.
    - Never output raw unlabelled lines for the script section.
  expected_output: >
    A single completely formatted text document containing all four sections perfectly assembled.
  agent: archivist

generate_editing_task:
  description: >
    Generate precise VN app editing instructions for the completed reel.

    {topic_profile}

    You have access to:
    - The validated reel script (5 or 6 clips)
    - The generated JSON prompts
    - The topic profile above

    First, analyze the JSON prompts to understand how the video and audio were created.
    Because the clips were generated with `generate_with_video: true`, recognize that
    the video and audio are intrinsically combined into a single file by the Veo model.

    YOUR OUTPUT must contain EXACTLY these sections in this order:
    SECTION A - IMPORT & TIMELINE SETUP
    SECTION B - CLIP TIMING & PAUSES
    SECTION C - AUDIO WORKFLOW
    SECTION D - COLOR GRADE
    SECTION E - TRANSITIONS BETWEEN CLIPS
    SECTION F - CAPTION OVERLAY (OPTIONAL)
    SECTION G - FINAL EXPORT SETTINGS

    SECTION RULES:
    - Support either 5 or 6 clips.
    - In SECTION B, list the clips in order and use their clip_role from the JSON.
    - Keep each generated clip at full duration unless the JSON clearly demands a trim.
    - Add pauses by role:
      Hook -> 1.5 seconds after the clip
      Question -> 1.0 second after the clip
      Mechanism / Mechanism Part 1 / Mechanism Part 2 -> 1.0 second after the clip
      Contrast/Payoff -> 2.0 seconds after the clip
      Personal Takeaway -> 1.5 seconds after the clip
    - Explain how to add each pause in VN using a freeze frame or black frame.
    - In SECTION C, do NOT instruct the editor to extract, sync, or separately manage narrator audio.
    - Add one separate VN background music track across the whole reel at 8% volume with 1-second fade-in and 2-second fade-out.
    - In SECTION E, keep transitions subtle. Recommended: Dissolve or Fade at 0.3 seconds maximum.

    OUTPUT FORMAT (MANDATORY):
    - Output plain text only.
    - Use the section headers exactly as shown above.
    - Number every instruction within each section starting from 1.
    - Be specific. Be short per step. One action per numbered point.
  expected_output: >
    A complete 7-section editing checklist specific to VN app, the topic's science
    category, and the reel's clip count. Every instruction is numbered and actionable.
  agent: editing_advisor
